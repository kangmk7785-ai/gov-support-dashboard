<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정부 지원금 통합 안내 | 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<style>
:root{--bg:#f6f7fb;--card:#fff;--text:#1a1a2e;--sub:#5a607f;--muted:#8b90a8;--accent:#3b5bdb;--accent2:#5c7cfa;--accentBg:#edf2ff;--border:#e8eaf0;--hover:#f0f2ff;--tag:#f1f3f8;--green:#12b886;--greenBg:#e6fcf5;--orange:#fd7e14;--orangeBg:#fff4e6;--red:#fa5252;--redBg:#fff5f5;--radius:14px;--shadow:0 2px 12px rgba(0,0,0,.04)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased}
::selection{background:var(--accent);color:#fff}
a{color:inherit;text-decoration:none}

/* Header */
.header{background:#fff;border-bottom:1px solid var(--border);padding:20px 0;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px);background:rgba(255,255,255,.92)}
.header-inner{max-width:1200px;margin:0 auto;padding:0 24px;display:flex;justify-content:space-between;align-items:center}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;font-weight:800}
.logo-text{font-size:18px;font-weight:800;color:var(--text);letter-spacing:-.03em}
.logo-text span{color:var(--accent)}
.header-stat{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--sub)}
.header-stat strong{font-size:18px;font-weight:800;color:var(--accent)}
.header-stat em{font-style:normal;font-size:11px;color:var(--muted);background:var(--tag);padding:2px 8px;border-radius:20px}

/* Ad slots */
.ad-slot{max-width:1200px;margin:16px auto;padding:0 24px}
.ad-box{background:#fafbfc;border:1px dashed var(--border);border-radius:10px;padding:12px;text-align:center;color:var(--muted);font-size:12px;min-height:50px;display:flex;align-items:center;justify-content:center}

/* Main */
.main{max-width:1200px;margin:0 auto;padding:20px 24px 80px}

/* Search & Filter Section */
.filter-section{background:#fff;border-radius:var(--radius);border:1px solid var(--border);padding:20px;margin-bottom:20px}
.search-box{position:relative;margin-bottom:16px}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--muted)}
.search-input{width:100%;padding:12px 16px 12px 42px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:inherit;outline:none;background:#f9fafb;color:var(--text);transition:all .2s}
.search-input:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px rgba(59,91,219,.1)}
.search-input::placeholder{color:var(--muted)}

.filter-row{display:flex;gap:12px;align-items:flex-start;flex-wrap:wrap;margin-bottom:12px}
.filter-row:last-child{margin-bottom:0}
.filter-label{font-size:12px;font-weight:700;color:var(--sub);min-width:52px;padding-top:7px;flex-shrink:0}
.filter-tags{display:flex;gap:6px;flex-wrap:wrap;flex:1}
.ftag{padding:6px 13px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:#fff;color:var(--sub);font-family:inherit;transition:all .18s;white-space:nowrap}
.ftag:hover{border-color:var(--accent);color:var(--accent);background:var(--accentBg)}
.ftag.on{border-color:var(--accent);background:var(--accent);color:#fff}

/* Sort & Count Bar */
.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.sort-btns{display:flex;gap:6px}
.sort-btn{padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--sub);font-family:inherit;transition:all .18s}
.sort-btn.on{background:var(--text);color:#fff;border-color:var(--text)}
.count-text{font-size:13px;color:var(--muted)}
.count-text strong{color:var(--accent);font-weight:800}

/* Cards Grid */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px}
.card{background:var(--card);border-radius:var(--radius);padding:20px;cursor:pointer;border:1px solid var(--border);transition:all .25s cubic-bezier(.22,1,.36,1);position:relative;overflow:hidden}
.card:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(0,0,0,.06);border-color:var(--accent)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;gap:8px}
.card-badges{display:flex;gap:5px;flex-wrap:wrap}
.badge-cat{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:6px;font-size:11px;font-weight:600}
.badge-region{padding:3px 8px;border-radius:6px;font-size:11px;font-weight:500;background:var(--tag);color:var(--sub)}
.badge-status{padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600}
.status-open{background:var(--greenBg);color:var(--green)}
.status-soon{background:var(--orangeBg);color:var(--orange)}
.status-closed{background:var(--redBg);color:var(--red)}
.status-always{background:var(--accentBg);color:var(--accent)}
.card-title{font-size:15px;font-weight:700;color:var(--text);line-height:1.45;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;letter-spacing:-.02em}
.card-org{font-size:12px;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:4px}
.card-info{display:flex;flex-direction:column;gap:4px}
.card-info-row{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--sub)}
.card-info-row .label{color:var(--muted);min-width:52px}
.card-info-row .value{font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-link{display:inline-flex;align-items:center;gap:4px;margin-top:12px;padding:6px 12px;border-radius:8px;font-size:12px;font-weight:600;color:var(--accent);background:var(--accentBg);transition:all .18s}
.card-link:hover{background:var(--accent);color:#fff}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-overlay.show{opacity:1;pointer-events:auto}
.modal{background:#fff;border-radius:18px;max-width:640px;width:100%;max-height:85vh;overflow-y:auto;padding:28px;position:relative;transform:translateY(20px);transition:transform .3s cubic-bezier(.22,1,.36,1)}
.modal-overlay.show .modal{transform:translateY(0)}
.modal-close{position:absolute;top:16px;right:16px;width:32px;height:32px;border-radius:8px;border:none;background:var(--tag);color:var(--sub);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .18s}
.modal-close:hover{background:var(--redBg);color:var(--red)}
.modal-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.modal-title{font-size:20px;font-weight:800;color:var(--text);line-height:1.4;margin-bottom:16px;letter-spacing:-.03em}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.modal-item{padding:14px;background:var(--tag);border-radius:10px}
.modal-item-label{font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px}
.modal-item-value{font-size:14px;font-weight:600;color:var(--text)}
.modal-section{margin-bottom:18px}
.modal-section h4{font-size:13px;font-weight:700;color:var(--text);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.modal-section p{font-size:14px;color:var(--sub);line-height:1.7}
.modal-apply{display:block;width:100%;padding:14px;border:none;border-radius:12px;background:var(--accent);color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .18s;text-align:center}
.modal-apply:hover{background:#2b4bc0;transform:translateY(-1px);box-shadow:0 4px 16px rgba(59,91,219,.3)}

/* Footer */
.footer{max-width:1200px;margin:0 auto;padding:24px;text-align:center;font-size:12px;color:var(--muted)}

/* Empty State */
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-text{font-size:15px;font-weight:600}
.empty-sub{font-size:13px;margin-top:4px}

/* Responsive */
@media(max-width:768px){
.cards{grid-template-columns:1fr}
.modal-grid{grid-template-columns:1fr}
.header-stat em{display:none}
.filter-row{flex-direction:column;gap:6px}
.filter-label{padding-top:0}
}

/* Animation */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card{animation:fadeIn .35s ease both}
</style>
</head>
<body>

<header class="header">
<div class="header-inner">
<div class="logo">
<div class="logo-icon">G</div>
<div><div class="logo-text">정부지원금 <span>통합안내</span></div></div>
</div>
<div class="header-stat"><strong id="totalCount">0</strong><span>건&nbsp;</span><em id="updateDate"></em></div>
</div>
</header>

<div class="ad-slot"><div class="ad-box" id="adHeader">광고 영역</div></div>

<main class="main">

<div class="filter-section">
<div class="search-box">
<span class="search-icon">🔍</span>
<input type="text" class="search-input" id="searchInput" placeholder="지원사업명, 키워드, 기관명으로 검색하세요...">
</div>

<div class="filter-row">
<span class="filter-label">분야</span>
<div class="filter-tags" id="catFilter">
<button class="ftag on" data-cat="all">전체</button>
<button class="ftag" data-cat="finance">자금·융자</button>
<button class="ftag" data-cat="startup">창업·벤처</button>
<button class="ftag" data-cat="rnd">R&D·기술</button>
<button class="ftag" data-cat="market">판로·수출</button>
<button class="ftag" data-cat="employ">고용·인력</button>
<button class="ftag" data-cat="edu">교육·훈련</button>
<button class="ftag" data-cat="consult">컨설팅·인증</button>
<button class="ftag" data-cat="smallbiz">소상공인</button>
<button class="ftag" data-cat="youth">청년</button>
<button class="ftag" data-cat="welfare">복지·생활</button>
<button class="ftag" data-cat="agri">농림·수산</button>
</div>
</div>

<div class="filter-row">
<span class="filter-label">단계</span>
<div class="filter-tags" id="subCatFilter">
<button class="ftag on" data-sub="all">전체</button>
<button class="ftag" data-sub="prepare">창업준비</button>
<button class="ftag" data-sub="early">초기자금</button>
<button class="ftag" data-sub="develop">기술개발</button>
<button class="ftag" data-sub="talent">인력확보</button>
<button class="ftag" data-sub="sales">판로개척</button>
<button class="ftag" data-sub="global">해외진출</button>
<button class="ftag" data-sub="stable">경영안정</button>
<button class="ftag" data-sub="restart">재기지원</button>
<button class="ftag" data-sub="life">생활복지</button>
</div>
</div>

<div class="filter-row">
<span class="filter-label">지역</span>
<div class="filter-tags" id="regionFilter">
<button class="ftag on" data-region="all">전체</button>
<button class="ftag" data-region="전국">전국</button>
<button class="ftag" data-region="서울">서울</button>
<button class="ftag" data-region="경기">경기</button>
<button class="ftag" data-region="인천">인천</button>
<button class="ftag" data-region="부산">부산</button>
<button class="ftag" data-region="대구">대구</button>
<button class="ftag" data-region="광주">광주</button>
<button class="ftag" data-region="대전">대전</button>
<button class="ftag" data-region="울산">울산</button>
<button class="ftag" data-region="세종">세종</button>
<button class="ftag" data-region="강원">강원</button>
<button class="ftag" data-region="충북">충북</button>
<button class="ftag" data-region="충남">충남</button>
<button class="ftag" data-region="전북">전북</button>
<button class="ftag" data-region="전남">전남</button>
<button class="ftag" data-region="경북">경북</button>
<button class="ftag" data-region="경남">경남</button>
<button class="ftag" data-region="제주">제주</button>
</div>
</div>

<div class="filter-row">
<span class="filter-label">대상</span>
<div class="filter-tags" id="targetFilter">
<button class="ftag on" data-target="all">전체</button>
<button class="ftag" data-target="중소기업">중소기업</button>
<button class="ftag" data-target="소상공인">소상공인</button>
<button class="ftag" data-target="창업">창업기업</button>
<button class="ftag" data-target="청년">청년</button>
<button class="ftag" data-target="여성">여성</button>
<button class="ftag" data-target="장애인">장애인</button>
<button class="ftag" data-target="저소득">저소득</button>
<button class="ftag" data-target="사회적기업">사회적기업</button>
</div>
</div>
</div>

<div class="toolbar">
<div class="sort-btns">
<button class="sort-btn on" data-sort="latest">최신순</button>
<button class="sort-btn" data-sort="deadline">마감임박순</button>
<button class="sort-btn" data-sort="views">조회순</button>
</div>
<div class="count-text">검색결과 <strong id="filteredCount">0</strong>건</div>
</div>

<div class="cards" id="cardGrid"></div>
<div class="empty" id="emptyState" style="display:none">
<div class="empty-icon">📭</div>
<div class="empty-text">검색 결과가 없습니다</div>
<div class="empty-sub">다른 키워드나 필터를 시도해보세요</div>
</div>
</main>

<div class="ad-slot"><div class="ad-box" id="adFooter">광고 영역</div></div>

<footer class="footer">
정부 지원금 정보는 매일 자동 수집됩니다. 실제 신청 전 반드시 해당 기관 공식 홈페이지에서 세부 요건을 확인하세요.
</footer>

<div class="modal-overlay" id="modalOverlay">
<div class="modal" id="modalContent"></div>
</div>

<script>
const P = __PROGRAMS_DATA__;

// Category config
const CAT={
finance:{label:"자금·융자",color:"#e03131",bg:"#fff5f5"},
startup:{label:"창업·벤처",color:"#5c7cfa",bg:"#edf2ff"},
rnd:{label:"R&D·기술",color:"#7950f2",bg:"#f3f0ff"},
market:{label:"판로·수출",color:"#e8590c",bg:"#fff4e6"},
employ:{label:"고용·인력",color:"#0ca678",bg:"#e6fcf5"},
edu:{label:"교육·훈련",color:"#1c7ed6",bg:"#e7f5ff"},
consult:{label:"컨설팅·인증",color:"#6741d9",bg:"#f3f0ff"},
smallbiz:{label:"소상공인",color:"#e67700",bg:"#fff9db"},
youth:{label:"청년",color:"#f06595",bg:"#fff0f6"},
welfare:{label:"복지·생활",color:"#d6336c",bg:"#fff0f6"},
agri:{label:"농림·수산",color:"#2b8a3e",bg:"#ebfbee"},
etc:{label:"기타",color:"#868e96",bg:"#f1f3f5"}
};

const SUBCAT={
prepare:"창업준비",early:"초기자금",develop:"기술개발",talent:"인력확보",
sales:"판로개척",global:"해외진출",stable:"경영안정",restart:"재기지원",life:"생활복지"
};

function getCat(c){return CAT[c]||{label:"기타",color:"#868e96",bg:"#f1f3f5"}}

function statusClass(s){
if(!s)return"status-always";
if(s.includes("마감")||s.includes("종료"))return"status-closed";
if(s.includes("임박"))return"status-soon";
if(s.includes("접수중"))return"status-open";
return"status-always";
}

function fmtDate(d){
if(!d||d==="상시")return"상시";
if(d.length===8)return d.slice(0,4)+"."+d.slice(4,6)+"."+d.slice(6);
return d;
}

function stripHtml(t){
if(!t)return"";
return t.replace(/<[^>]+>/g," ").replace(/&nbsp;/g," ").replace(/&[a-zA-Z]+;/g," ").replace(/\s+/g," ").trim();
}

// State
let activeCat="all",activeRegion="all",activeTarget="all",activeSub="all",activeSort="latest",searchQuery="";

// Render
function render(){
let items=P.filter(p=>{
if(activeCat!=="all"&&p.category!==activeCat)return false;
if(activeSub!=="all"&&p.subCategory!==activeSub)return false;
if(activeRegion!=="all"&&p.region!==activeRegion)return false;
if(activeTarget!=="all"){
const t=(p.target||"")+(p.title||"")+(p.description||"");
if(!t.includes(activeTarget))return false;
}
if(searchQuery){
const q=searchQuery.toLowerCase();
const s=((p.title||"")+(p.org||"")+(p.description||"")+(p.target||"")).toLowerCase();
if(!s.includes(q))return false;
}
return true;
});

// Sort
if(activeSort==="deadline"){
items.sort((a,b)=>{
if(a.deadline==="상시")return 1;if(b.deadline==="상시")return-1;
return a.deadline.localeCompare(b.deadline);
});
}else if(activeSort==="views"){
items.sort((a,b)=>(b.views||0)-(a.views||0));
}else{
items.sort((a,b)=>(b.id||0)-(a.id||0));
}

const grid=document.getElementById("cardGrid");
const empty=document.getElementById("emptyState");
document.getElementById("filteredCount").textContent=items.length;

if(items.length===0){
grid.innerHTML="";
empty.style.display="block";
return;
}
empty.style.display="none";

grid.innerHTML=items.map((p,i)=>{
const c=getCat(p.category);
const sc=statusClass(p.status);
const desc=stripHtml(p.description).slice(0,80);
const target=stripHtml(p.target).slice(0,40);
return`<div class="card" style="animation-delay:${Math.min(i*0.03,0.5)}s" onclick="openModal(${p.id})">
<div class="card-top">
<div class="card-badges">
<span class="badge-cat" style="background:${c.bg};color:${c.color}">${c.label}</span>
${p.subCategory&&SUBCAT[p.subCategory]?`<span class="badge-region" style="background:#edf2ff;color:#4263eb">${SUBCAT[p.subCategory]}</span>`:''}
<span class="badge-region">${p.region||"전국"}</span>
</div>
<span class="badge-status ${sc}">${p.status||"상시접수"}</span>
</div>
<div class="card-title">${p.title}</div>
<div class="card-org">🏛 ${p.org}</div>
<div class="card-info">
<div class="card-info-row"><span class="label">지원대상</span><span class="value">${target||"공고문 참조"}</span></div>
<div class="card-info-row"><span class="label">신청마감</span><span class="value">${fmtDate(p.deadline)}</span></div>
</div>
<span class="card-link" onclick="event.stopPropagation();window.open('${p.url}','_blank')">상세정보 →</span>
</div>`;
}).join("");
}

// Modal
function openModal(id){
const p=P.find(x=>x.id===id);
if(!p)return;
const c=getCat(p.category);
const sc=statusClass(p.status);
const desc=stripHtml(p.description);
const target=stripHtml(p.target);

document.getElementById("modalContent").innerHTML=`
<button class="modal-close" onclick="closeModal()">✕</button>
<div class="modal-badges">
<span class="badge-cat" style="background:${c.bg};color:${c.color}">${c.label}</span>
<span class="badge-region">${p.region||"전국"}</span>
<span class="badge-status ${sc}">${p.status||"상시접수"}</span>
</div>
<div class="modal-title">${p.title}</div>
<div class="modal-grid">
<div class="modal-item"><div class="modal-item-label">지원기관</div><div class="modal-item-value">${p.org}</div></div>
<div class="modal-item"><div class="modal-item-label">지원금액</div><div class="modal-item-value">${p.amount||"공고문 참조"}</div></div>

document.getElementById("modalOverlay").classList.add("show");
document.body.style.overflow="hidden";
}

function closeModal(){
document.getElementById("modalOverlay").classList.remove("show");
document.body.style.overflow="";
}

document.getElementById("modalOverlay").addEventListener("click",function(e){
if(e.target===this)closeModal();
});
document.addEventListener("keydown",function(e){if(e.key==="Escape")closeModal()});

// Filter handlers
document.getElementById("catFilter").addEventListener("click",function(e){
const btn=e.target.closest(".ftag");
if(!btn)return;
activeCat=btn.dataset.cat;
this.querySelectorAll(".ftag").forEach(b=>b.classList.toggle("on",b.dataset.cat===activeCat));
render();
});

document.getElementById("regionFilter").addEventListener("click",function(e){
const btn=e.target.closest(".ftag");
if(!btn)return;
activeRegion=btn.dataset.region;
this.querySelectorAll(".ftag").forEach(b=>b.classList.toggle("on",b.dataset.region===activeRegion));
render();
});

document.getElementById("subCatFilter").addEventListener("click",function(e){
const btn=e.target.closest(".ftag");
if(!btn)return;
activeSub=btn.dataset.sub;
this.querySelectorAll(".ftag").forEach(b=>b.classList.toggle("on",b.dataset.sub===activeSub));
render();
});

document.getElementById("targetFilter").addEventListener("click",function(e){
const btn=e.target.closest(".ftag");
if(!btn)return;
activeTarget=btn.dataset.target;
this.querySelectorAll(".ftag").forEach(b=>b.classList.toggle("on",b.dataset.target===activeTarget));
render();
});

document.querySelectorAll(".sort-btn").forEach(btn=>{
btn.addEventListener("click",function(){
activeSort=this.dataset.sort;
document.querySelectorAll(".sort-btn").forEach(b=>b.classList.toggle("on",b.dataset.sort===activeSort));
render();
});
});

let searchTimer;
document.getElementById("searchInput").addEventListener("input",function(){
clearTimeout(searchTimer);
searchTimer=setTimeout(()=>{searchQuery=this.value.trim();render();},250);
});

// Init
document.getElementById("totalCount").textContent=P.length;
document.getElementById("updateDate").textContent=new Date().toLocaleDateString("ko-KR")+" 기준";
render();

// Ad control functions
function hideAd(id){const e=document.getElementById(id);if(e)e.parentElement.style.display="none"}
function showAd(id){const e=document.getElementById(id);if(e)e.parentElement.style.display="block"}
function setAd(id,html){const e=document.getElementById(id);if(e)e.innerHTML=html}
</script>
