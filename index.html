<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정부 지원금 통합 안내 | 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body>
    <header class="bg-[#0F172A] text-white py-6 shadow-xl sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 flex justify-between items-center">
            <h1 class="text-2xl font-black text-blue-400">🏛 정부지원금 <span class="text-white">통합안내</span></h1>
            <div class="bg-slate-800 px-4 py-1 rounded-full border border-slate-700">
                <span class="text-sm text-slate-400">총 <b id="totalCnt" class="text-blue-400 text-lg">0</b> 건</span>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8">
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mb-8">
            <input type="text" id="searchInp" oninput="render()" placeholder="지원 사업 검색..." 
                   class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition-all mb-4">
            <div class="flex flex-wrap gap-2" id="catBtns"></div>
        </div>

        <div id="grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </main>

    <div id="overlay" onclick="closeModal()" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4">
        <div id="modal" onclick="event.stopPropagation()" class="bg-white w-full max-w-2xl rounded-3xl shadow-2xl p-8 max-h-[90vh] overflow-y-auto"></div>
    </div>

    <script>
        // 데이터 (사용자님의 기존 데이터 구조 유지)
        const P = [{"title": "[광주] 2026년 상반기 구조고도화자금 지원 계획 공고", "org": "광주광역시", "category": "startup", "region": "광주", "amount": "공고문 참조", "deadline": "상시", "status": "상시접수", "description": "공장 및 제조업장을 소유하거나 임차 중인 중소 제조업체 지원", "url": "https://www.bizinfo.go.kr", "id": 1}];
        
        const CATS = [{id:"all", label:"전체"}, {id:"small_biz", label:"소상공인"}, {id:"startup", label:"창업지원"}, {id:"employment", label:"고용/취업"}];

        let currentCat = 'all';

        function init() {
            const catBtns = document.getElementById('catBtns');
            CATS.forEach(c => {
                const btn = document.createElement('button');
                btn.textContent = c.label;
                btn.onclick = () => { currentCat = c.id; render(); };
                btn.className = "px-4 py-2 rounded-full border text-sm font-bold transition-all";
                btn.id = `btn-${c.id}`;
                catBtns.appendChild(btn);
            });
            render();
        }

        function render() {
            const query = document.getElementById('searchInp').value.toLowerCase();
            const grid = document.getElementById('grid');
            
            // 필터링
            const filtered = P.filter(item => {
                const matchSearch = item.title.toLowerCase().includes(query) || item.org.toLowerCase().includes(query);
                const matchCat = currentCat === 'all' || item.category === currentCat;
                return matchSearch && matchCat;
            });

            // 버튼 스타일
            CATS.forEach(c => {
                const btn = document.getElementById(`btn-${c.id}`);
                btn.className = currentCat === c.id ? "px-4 py-2 rounded-full bg-blue-600 text-white shadow-md" : "px-4 py-2 rounded-full bg-white text-slate-600 border border-slate-200 hover:border-blue-400";
            });

            document.getElementById('totalCnt').textContent = filtered.length;
            grid.innerHTML = filtered.map(item => `
                <div onclick="openModal(${item.id})" class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 hover:shadow-lg hover:-translate-y-1 transition-all cursor-pointer">
                    <div class="flex justify-between mb-3 text-[11px] font-bold">
                        <span class="text-blue-600 bg-blue-50 px-2 py-0.5 rounded">${item.region}</span>
                        <span class="text-slate-400">${item.status}</span>
                    </div>
                    <h3 class="font-bold text-slate-900 mb-2 line-clamp-2">${item.title}</h3>
                    <p class="text-sm text-slate-500 mb-4">${item.org}</p>
                    <div class="border-t pt-4 flex justify-between items-center text-xs">
                        <span class="font-bold text-blue-600">${item.amount}</span>
                        <span class="text-slate-400">${item.deadline}</span>
                    </div>
                </div>
            `).join('');
        }

        function openModal(id) {
            const item = P.find(p => p.id === id);
            document.getElementById('modal').innerHTML = `
                <h2 class="text-2xl font-black mb-4">${item.title}</h2>
                <div class="bg-slate-50 p-4 rounded-xl mb-6 grid grid-cols-2 gap-4">
                    <div><p class="text-xs text-slate-400 mb-1">기관</p><p class="font-bold text-sm">${item.org}</p></div>
                    <div><p class="text-xs text-slate-400 mb-1">금액</p><p class="font-bold text-sm text-blue-600">${item.amount}</p></div>
                </div>
                <div class="text-slate-600 text-sm leading-relaxed mb-8">${item.description}</div>
                <a href="${item.url}" target="_blank" class="block w-full bg-blue-600 text-white text-center py-4 rounded-xl font-bold shadow-lg">공식 홈페이지 가기</a>
            `;
            document.getElementById('overlay').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('overlay').classList.add('hidden'); }

        window.onload = init;
    </script>
</body>
</html>
