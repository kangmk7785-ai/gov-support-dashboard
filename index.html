<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 정부지원금 통합안내 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
    body { font-family: 'Noto Sans KR', sans-serif; background-color: #f3f4f6; }
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .card-hover:hover { transform: translateY(-5px); transition: all 0.3s ease; }
    /* 애니메이션 */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-in { animation: fadeIn 0.4s ease forwards; }
</style>
</head>
<body>

<div class="min-h-screen">
    <header class="bg-slate-900 text-white py-6 sticky top-0 z-50 shadow-lg">
        <div class="max-w-7xl mx-auto px-4 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black tracking-tight text-blue-400">🏛 정부지원금 <span class="text-white">통합안내</span></h1>
                <p class="text-xs text-slate-400 mt-1">2026년 실시간 업데이트 데이터베이스</p>
            </div>
            <div class="bg-slate-800 px-4 py-2 rounded-full border border-slate-700">
                <span class="text-sm text-slate-400">전체 데이터:</span>
                <span class="ml-2 text-xl font-bold text-blue-400" id="totalCnt">0</span>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <div class="bg-white p-6 rounded-2xl shadow-sm mb-8 border border-gray-200">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="relative md:col-span-2">
                    <span class="absolute left-4 top-3.5 text-gray-400">🔍</span>
                    <input type="text" id="searchInp" oninput="render()" placeholder="지원 사업명, 기관명, 키워드를 입력하세요..." 
                           class="w-full pl-12 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                </div>
                <div class="flex gap-2">
                    <select id="regionSel" onchange="render()" class="w-1/2 p-3 bg-gray-50 border border-gray-200 rounded-xl text-sm font-medium outline-none">
                        <option value="전체">전국 지역</option>
                    </select>
                    <select id="sortSel" onchange="render()" class="w-1/2 p-3 bg-gray-50 border border-gray-200 rounded-xl text-sm font-medium outline-none">
                        <option value="latest">최신순</option>
                        <option value="deadline">마감임박순</option>
                    </select>
                </div>
            </div>
            <div class="flex flex-wrap gap-2 mt-4" id="catBtns"></div>
        </div>

        <div class="flex items-center justify-between mb-6 px-2">
            <h2 class="text-lg font-bold text-gray-700">검색 결과 <span class="text-blue-600" id="filtCnt">0</span>건</h2>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="grid">
            </div>
    </main>

    <footer class="bg-white border-t border-gray-200 py-10 mt-12 text-center text-gray-500 text-sm">
        <p>© 2026 정부지원금 통합안내. 본 정보는 공공 API를 기반으로 자동 수집되었습니다.</p>
    </footer>
</div>

<div id="overlay" onclick="closeModal()" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4">
    <div id="modal" onclick="event.stopPropagation()" class="bg-white w-full max-w-2xl rounded-3xl shadow-2xl overflow-hidden animate-in">
        </div>
</div>

<script>
// 데이터 구조 (기존 데이터 유지)
const CATS = [
    {id:"all", label:"전체", color:"blue"},
    {id:"small_biz", label:"소상공인", color:"amber"},
    {id:"startup", label:"창업지원", color:"purple"},
    {id:"employment", label:"고용/취업", color:"green"},
    {id:"tech", label:"기술/R&D", color:"pink"}
];
const REGS = ["전국","서울","부산","대구","인천","광주","대전","울산","세종","경기","강원","충북","충남","전북","전남","경북","경남","제주"];

// 원본 데이터를 여기에 유지 (사용자님이 주신 P 배열)
const P = [
    {"title": "[광주] 2026년 상반기 구조고도화자금 지원 계획 공고", "org": "광주광역시", "category": "startup", "region": "광주", "amount": "최대 10억원", "deadline": "상시", "status": "상시접수", "description": "공장 및 제조업장을 소유하거나 임차 중인 중소 제조업체 지원", "id": 1, "isNew": true},
    // ... 추가 데이터들이 들어올 자리
];

let currentCat = 'all';

// 초기화 함수
function init() {
    // 지역 선택 메뉴 생성
    const regSel = document.getElementById('regionSel');
    REGS.forEach(r => {
        const opt = document.createElement('option');
        opt.value = r; opt.textContent = r;
        regSel.appendChild(opt);
    });

    // 카테고리 버튼 생성
    const catContainer = document.getElementById('catBtns');
    CATS.forEach(c => {
        const btn = document.createElement('button');
        btn.textContent = c.label;
        btn.onclick = () => { currentCat = c.id; render(); };
        btn.className = `px-4 py-1.5 rounded-full text-sm font-semibold border transition-all ${currentCat === c.id ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-gray-600 border-gray-200 hover:border-blue-400'}`;
        btn.id = `btn-${c.id}`;
        catContainer.appendChild(btn);
    });

    render();
}

function render() {
    const query = document.getElementById('searchInp').value.toLowerCase();
    const region = document.getElementById('regionSel').value;
    const grid = document.getElementById('grid');
    
    // 버튼 스타일 업데이트
    document.querySelectorAll('#catBtns button').forEach(btn => {
        const cid = btn.id.split('-')[1];
        if(cid === currentCat) {
            btn.className = "px-4 py-1.5 rounded-full text-sm font-semibold bg-blue-600 text-white border-blue-600 shadow-md transition-all";
        } else {
            btn.className = "px-4 py-1.5 rounded-full text-sm font-semibold bg-white text-gray-600 border-gray-200 hover:border-blue-400 transition-all";
        }
    });

    // 필터링 로직
    const filtered = P.filter(item => {
        const matchSearch = item.title.toLowerCase().includes(query) || item.org.toLowerCase().includes(query);
        const matchRegion = region === '전체' || item.region.includes(region);
        const matchCat = currentCat === 'all' || item.category === currentCat;
        return matchSearch && matchRegion && matchCat;
    });

    document.getElementById('totalCnt').textContent = P.length;
    document.getElementById('filtCnt').textContent = filtered.length;

    // 그리드 생성
    grid.innerHTML = filtered.map(item => `
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 card-hover cursor-pointer relative overflow-hidden" onclick="openModal(${item.id})">
            <div class="absolute top-0 left-0 w-1 h-full bg-blue-500"></div>
            <div class="flex justify-between items-start mb-4">
                <span class="text-[10px] font-bold px-2 py-0.5 rounded bg-blue-50 text-blue-600 uppercase">${item.region}</span>
                <span class="text-xs font-bold ${item.status === '상시접수' ? 'text-green-600' : 'text-red-500'}">● ${item.status}</span>
            </div>
            <h3 class="text-lg font-bold text-gray-900 mb-2 line-clamp-2 leading-snug">${item.title}</h3>
            <p class="text-sm text-gray-500 mb-4">${item.org}</p>
            <div class="bg-gray-50 p-3 rounded-lg mb-4">
                <div class="flex justify-between text-xs mb-1">
                    <span class="text-gray-400">지원규모</span>
                    <span class="font-bold text-gray-700">${item.amount}</span>
                </div>
                <div class="flex justify-between text-xs">
                    <span class="text-gray-400">마감일</span>
                    <span class="font-bold text-gray-700">${item.deadline}</span>
                </div>
            </div>
            <div class="flex justify-between items-center">
                <span class="text-xs text-gray-400">#${item.category}</span>
                <button class="text-blue-600 text-sm font-bold hover:underline">상세보기 →</button>
            </div>
        </div>
    `).join('');
}

function openModal(id) {
    const item = P.find(p => p.id === id);
    if(!item) return;
    const modal = document.getElementById('modal');
    modal.innerHTML = `
        <div class="p-8">
            <div class="flex justify-between items-start mb-6">
                <div>
                    <span class="bg-blue-600 text-white text-[10px] font-bold px-2 py-1 rounded-md uppercase">${item.region}</span>
                    <h2 class="text-2xl font-black text-gray-900 mt-3 leading-tight">${item.title}</h2>
                </div>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-2xl">✕</button>
            </div>
            <div class="grid grid-cols-2 gap-4 mb-8">
                <div class="bg-gray-50 p-4 rounded-xl">
                    <p class="text-[10px] text-gray-400 font-bold mb-1">주관기관</p>
                    <p class="text-sm font-bold text-gray-800">${item.org}</p>
                </div>
                <div class="bg-gray-50 p-4 rounded-xl">
                    <p class="text-[10px] text-gray-400 font-bold mb-1">지원금액</p>
                    <p class="text-sm font-bold text-blue-600">${item.amount}</p>
                </div>
            </div>
            <div class="prose prose-sm max-w-none text-gray-600 mb-8">
                <h4 class="text-gray-900 font-bold mb-2">사업설명</h4>
                ${item.description}
            </div>
            <a href="${item.url || '#'}" target="_blank" class="block w-full bg-blue-600 text-white text-center py-4 rounded-xl font-bold hover:bg-blue-700 transition-all shadow-lg shadow-blue-200">
                공식 홈페이지에서 신청하기
            </a>
        </div>
    `;
    document.getElementById('overlay').classList.remove('hidden');
}

function closeModal() {
    document.getElementById('overlay').classList.add('hidden');
}

window.onload = init;
</script>

</body>
</html>
